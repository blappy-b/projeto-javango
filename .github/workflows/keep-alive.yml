name: Keep Alive - Ping Supabase

on:
  schedule:
    # Executa a cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
    # Ajuste conforme necessário, mas não menos que a cada 5 minutos
    - cron: '0 */6 * * *'
  
  # Permite execução manual do workflow no GitHub
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    
    steps:
      - name: Ping Health Check Endpoint
        run: |
          echo "🔄 Fazendo ping no health check..."
          
          # Substitua pela URL real do seu app em produção
          # Exemplo: https://seu-app.vercel.app/api/health
          URL="${{ secrets.APP_URL }}/api/health"
          
          # Faz requisição e captura o status HTTP
          response=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          
          # Verifica se foi bem-sucedido
          if [ $response -eq 200 ]; then
            echo "✅ Health check passou! (HTTP $response)"
            echo "✅ Supabase está ativo e respondendo"
          else
            echo "❌ Health check falhou! (HTTP $response)"
            exit 1
          fi
      
      - name: Mostrar timestamp
        if: success()
        run: |
          echo "⏰ Ping executado em: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
